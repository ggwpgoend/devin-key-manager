{{define "keys_bulk_form"}}
<div class="fixed inset-0 z-30 flex items-center justify-center bg-slate-950/70 backdrop-blur-sm"
     hx-target="this"
     hx-swap="outerHTML"
     onclick="if(event.target===this){this.remove();}">
  <div class="w-full max-w-2xl rounded-lg border border-slate-800 bg-slate-900 p-6 shadow-xl">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-lg font-semibold">Bulk import keys</h2>
      <button class="rounded-md p-1 text-slate-400 hover:text-white"
              hx-get="/keys/dialog/close"
              hx-target="#dialog"
              hx-swap="innerHTML">✕</button>
    </div>

    <form class="space-y-4"
          hx-post="/keys/bulk"
          hx-target="this"
          hx-swap="outerHTML">
      <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-400">Paste keys, one per line</label>
        <textarea name="payload" rows="10" autofocus required spellcheck="false"
          placeholder="dev-just-the-key
trial-1 dev-with-label-1
trial-2: dev-with-label-2
team-1 : paid : dev-team-1
# comments and blank lines are ignored"
          class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 font-mono text-xs text-white focus:border-indigo-500 focus:outline-none"></textarea>
        <p class="mt-2 text-xs text-slate-500">
          Accepted formats per line: <code class="text-slate-300">key</code>,
          <code class="text-slate-300">label key</code>,
          <code class="text-slate-300">label : key</code>, or
          <code class="text-slate-300">label : plan : key</code>.
          Lines without an explicit plan are auto-detected against the Devin API.
        </p>
      </div>

      {{if .Error}}
      <div class="rounded-md border border-rose-700/40 bg-rose-900/30 px-3 py-2 text-sm text-rose-200">
        {{.Error}}
      </div>
      {{end}}

      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button"
                hx-get="/keys/dialog/close"
                hx-target="#dialog"
                hx-swap="innerHTML"
                class="rounded-md border border-slate-700 px-3 py-1.5 text-sm text-slate-200 hover:bg-slate-800">Cancel</button>
        <button type="submit"
                class="rounded-md bg-indigo-500 px-4 py-1.5 text-sm font-medium text-white hover:bg-indigo-400">
          Import
        </button>
      </div>
    </form>
  </div>
</div>
{{end}}
