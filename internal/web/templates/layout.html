{{define "layout"}}<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}} · devin-key-manager</title>
  <!-- Vendor assets are served from /static/vendor/* embedded into the
       binary so the manager works fully offline. ?v= cache-bust lets the
       browser refresh after a binary upgrade. -->
  <script src="/static/vendor/tailwind-play.min.js?v={{.Version}}"></script>
  <script src="/static/vendor/htmx.min.js?v={{.Version}}" defer></script>
  <!-- Markdown rendering + syntax highlighting for chat bubbles (PR-5). -->
  <script src="/static/vendor/marked.min.js?v={{.Version}}" defer></script>
  <link rel="stylesheet" href="/static/vendor/atom-one-dark.min.css?v={{.Version}}">
  <script src="/static/vendor/highlight.min.js?v={{.Version}}" defer></script>
  <!-- Storm UI palette (PR-11): bento + dock + dark-blue typography.
       Loaded after Tailwind so storm classes win specificity ties. -->
  <link rel="stylesheet" href="/static/storm.css?v={{.Version}}">
  <style>
    /* Tailwind palette overrides — retint the slate ramp to storm tones.
       The existing templates still use slate-* utilities; this remap lets
       them inherit the storm aesthetic without rewriting every class. */
    .bg-slate-950 { background-color: var(--bg) !important; }
    .bg-slate-900 { background-color: var(--surface-solid) !important; }
    .bg-slate-900\/60 { background-color: rgba(16,21,30,0.7) !important; }
    .bg-slate-900\/40 { background-color: rgba(16,21,30,0.5) !important; }
    .bg-slate-800 { background-color: var(--surface-2) !important; }
    .bg-slate-800\/60 { background-color: rgba(21,28,40,0.6) !important; }
    .border-slate-800 { border-color: var(--border) !important; }
    .border-slate-700 { border-color: var(--border-h) !important; }
    .divide-slate-800 > * + * { border-color: var(--border) !important; }
    .text-slate-100 { color: var(--white) !important; }
    .text-slate-200 { color: var(--text-h) !important; }
    .text-slate-300 { color: var(--text-h) !important; }
    .text-slate-400 { color: var(--text) !important; }
    .text-slate-500 { color: var(--text-dim) !important; }
    .text-slate-600 { color: var(--text-dim) !important; }
    .text-slate-700 { color: rgba(74,85,104,0.6) !important; }
    /* Indigo accents (used for primary actions) → storm accent. */
    .text-indigo-300, .text-indigo-400 { color: var(--accent-flash) !important; }
    .hover\:text-indigo-300:hover { color: var(--accent-flash) !important; }
    .bg-indigo-500 { background-color: var(--accent) !important; }
    .bg-indigo-500\/15 { background-color: rgba(74,122,155,0.15) !important; }
    .border-indigo-500 { border-color: var(--accent) !important; }

    body { font-family: var(--font-body); background: var(--bg); color: var(--text-h); }
    html, body { min-height: 100vh; }
    .pill { @apply inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium; }
    /* Markdown body styling — keeps Devin's prose readable without overpowering
       the chat bubble layout. */
    .md-body { line-height: 1.55; }
    .md-body p { margin: 0 0 0.6em; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body strong { color: #f1f5f9; font-weight: 600; }
    .md-body em { color: #cbd5e1; font-style: italic; }
    .md-body ul, .md-body ol { margin: 0.3em 0 0.6em 1.2em; padding: 0; }
    .md-body ul { list-style: disc; }
    .md-body ol { list-style: decimal; }
    .md-body li { margin: 0.15em 0; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      font-weight: 600; color: #f1f5f9; margin: 0.6em 0 0.3em;
    }
    .md-body h1 { font-size: 1.15em; }
    .md-body h2 { font-size: 1.08em; }
    .md-body h3, .md-body h4 { font-size: 1em; }
    .md-body a { color: #818cf8; text-decoration: underline; word-break: break-word; }
    .md-body a:hover { color: #a5b4fc; }
    .md-body code:not(pre code) {
      background: rgba(15, 23, 42, 0.7); color: #fbbf24;
      padding: 1px 6px; border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.88em;
    }
    .md-body pre {
      background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
      padding: 10px 12px; margin: 0.5em 0; overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85em; position: relative;
    }
    .md-body pre code { background: transparent; padding: 0; color: #e2e8f0; }
    .md-body blockquote {
      border-left: 3px solid #475569; padding-left: 0.8em;
      color: #cbd5e1; margin: 0.5em 0;
    }
    .md-body table {
      border-collapse: collapse; margin: 0.5em 0; font-size: 0.88em;
    }
    .md-body th, .md-body td {
      border: 1px solid #334155; padding: 4px 8px;
    }
    .md-body th { background: #1e293b; }
    /* Copy-to-clipboard button on every code block. */
    .md-copy {
      position: absolute; top: 4px; right: 4px;
      background: rgba(15, 23, 42, 0.85); color: #cbd5e1;
      border: 1px solid #334155; border-radius: 4px;
      padding: 2px 8px; font-size: 11px; cursor: pointer;
      opacity: 0; transition: opacity 0.12s;
    }
    .md-body pre:hover .md-copy { opacity: 1; }
    .md-copy:hover { background: #1e293b; color: #f1f5f9; }
    .md-copy--ok { color: #34d399 !important; }
  </style>
</head>
<body class="min-h-full">
  <!-- Storm topbar: minimal sticky header. Title + version + notif bell. -->
  <div class="s-topbar">
    <div class="s-topbar-brand">
      <span class="s-brand-mark">K</span>
      <span>devin-key-manager</span>
      <span class="s-version-chip">{{.Version}}</span>
    </div>
    <div class="s-topbar-meta">
      <span id="sse-status" class="s-muted" title="Live event stream status">○ live</span>
      <div id="notif-bell"></div>
    </div>
  </div>

  <main class="storm-container">
    {{template "content" .}}
  </main>

  <!-- Floating dock: primary navigation. Mirrors the storm prototype. -->
  <nav class="dock" aria-label="Primary">
    <a href="/" class="dock-item{{if eq .Active "dashboard"}} active{{end}}" title="Dashboard">
      <span class="dock-tooltip">Dashboard</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </a>
    <a href="/tasks" class="dock-item{{if eq .Active "tasks"}} active{{end}}" title="Tasks">
      <span class="dock-tooltip">Tasks</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </a>
    <a href="/keys" class="dock-item{{if eq .Active "keys"}} active{{end}}" title="Keys">
      <span class="dock-tooltip">Keys</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
    </a>
    <a href="/schedules" class="dock-item{{if eq .Active "schedules"}} active{{end}}" title="Schedules">
      <span class="dock-tooltip">Schedules</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </a>
  </nav>

  <!-- Toast container for live SSE notifications. -->
  <div id="s-toast-container" aria-live="polite"></div>
  <script>
    // Markdown renderer for chat bubbles.
    //
    // Two correctness concerns drive the design here:
    //   1. The chat stream is polled every 4s by HTMX. Without caching we
    //      would re-parse every message's markdown and re-run highlight.js
    //      on every code block on every tick — a few hundred ms of UI
    //      jank per poll for a long chat. We cache rendered HTML by
    //      message id (data-md-key) + raw content hash, so unchanged
    //      messages restore from cache in O(1).
    //   2. The scroll container (#chat-scroll) is now OUTSIDE the swapped
    //      #chat-stream element, so the container survives the swap.
    //      That preserves scroll position automatically when reading
    //      historical messages, while still letting us auto-stick to the
    //      bottom when the user IS at the bottom (i.e. tailing live).
    (function () {
      var mdCache = Object.create(null);
      function djb2(s) {
        var h = 5381;
        for (var i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
        return h;
      }
      function attachCopyButton(pre, code) {
        if (!pre || pre.querySelector(".md-copy")) return;
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "md-copy";
        btn.textContent = "Copy";
        btn.addEventListener("click", function () {
          navigator.clipboard.writeText(code.innerText || code.textContent || "").then(function () {
            btn.textContent = "Copied";
            btn.classList.add("md-copy--ok");
            setTimeout(function () {
              btn.textContent = "Copy";
              btn.classList.remove("md-copy--ok");
            }, 1200);
          });
        });
        pre.appendChild(btn);
      }
      function renderAll(root) {
        if (typeof marked === "undefined") return;
        marked.use({
          gfm: true,
          breaks: true,
          mangle: false,
          headerIds: false,
        });
        (root || document).querySelectorAll("[data-md]:not([data-md-done])").forEach(function (el) {
          var src = el.getAttribute("data-md-src") || el.textContent;
          var key = el.getAttribute("data-md-key");
          var cacheKey = key ? key + ":" + djb2(src) : "";
          el.classList.add("md-body");
          if (cacheKey && mdCache[cacheKey]) {
            // Restore cached HTML — skip marked + highlight.js entirely.
            el.innerHTML = mdCache[cacheKey];
          } else {
            el.innerHTML = marked.parse(src);
            el.querySelectorAll("pre code").forEach(function (code) {
              if (typeof hljs !== "undefined") {
                try { hljs.highlightElement(code); } catch (e) {}
              }
              attachCopyButton(code.parentElement, code);
            });
            if (cacheKey) mdCache[cacheKey] = el.innerHTML;
          }
          // Always (re)attach copy handlers — innerHTML restore loses the
          // listeners but keeps the .md-copy DOM nodes from the cached
          // markup; the click handler we attached above is gone, so wire
          // a fresh one over the existing button.
          el.querySelectorAll("pre code").forEach(function (code) {
            var pre = code.parentElement;
            var existing = pre && pre.querySelector(".md-copy");
            if (existing) existing.remove();
            attachCopyButton(pre, code);
          });
          el.setAttribute("data-md-done", "1");
        });
      }

      // Sticky-bottom scroll: only auto-scroll the chat container to the
      // bottom when the user was within 80px of the bottom BEFORE the
      // swap. Otherwise leave them where they are (mid-history reading).
      var stickyBottom = true;
      function recordSticky() {
        var sc = document.getElementById("chat-scroll");
        if (!sc) return;
        stickyBottom = (sc.scrollHeight - sc.scrollTop - sc.clientHeight) < 80;
      }
      function applySticky() {
        var sc = document.getElementById("chat-scroll");
        if (!sc) return;
        if (stickyBottom) sc.scrollTop = sc.scrollHeight;
      }
      document.addEventListener("scroll", recordSticky, true);

      window.renderMarkdown = renderAll;
      document.addEventListener("DOMContentLoaded", function () {
        renderAll(document);
        applySticky();
      });
      document.addEventListener("htmx:beforeSwap", function () { recordSticky(); });
      document.addEventListener("htmx:afterSwap", function (evt) {
        renderAll(evt.target);
        applySticky();
      });
    })();
  </script>
  <footer class="storm-container" style="padding-top:0;padding-bottom:90px;color:var(--text-dim);font-size:0.7rem">
    Local dashboard — listening on this machine only. Master key file:
    <code class="s-mono">{{.MasterKeyPath}}</code>
  </footer>
  <script>
    // PR-8: lightweight browser-notification poller. We hit /events/since
    // periodically; for each unseen event we pop a Notification (subject to
    // the user having granted permission) and bump the high-water id in
    // localStorage so we don't double-toast on reload.
    (function () {
      const STORAGE_KEY = "devinmgr.lastEventId";
      const POLL_MS = 15000;
      const bell = document.getElementById("notif-bell");

      function renderBell(state) {
        if (!bell) return;
        bell.innerHTML = "";
        if (state === "default") {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "rounded-full border border-slate-700 px-3 py-1 text-xs text-slate-300 hover:bg-slate-800";
          btn.textContent = "🔔 Enable notifications";
          btn.addEventListener("click", () => {
            Notification.requestPermission().then(p => renderBell(p));
          });
          bell.appendChild(btn);
        } else if (state === "denied") {
          const span = document.createElement("span");
          span.className = "text-slate-600";
          span.title = "Browser denied notification permission.";
          span.textContent = "🔕";
          bell.appendChild(span);
        } else if (state === "granted") {
          const span = document.createElement("span");
          span.className = "text-emerald-400";
          span.title = "Browser notifications enabled.";
          span.textContent = "🔔";
          bell.appendChild(span);
        }
      }

      if (!("Notification" in window)) {
        // Browser without the Notification API — no-op but keep the polling
        // alive so the rest of the dashboard works.
        if (bell) bell.textContent = "🔕";
      } else {
        renderBell(Notification.permission);
      }

      function showNotification(e) {
        if (!("Notification" in window) || Notification.permission !== "granted") return;
        const opts = { body: e.body || "", tag: "devinmgr-" + e.id };
        const n = new Notification(e.title || "devin-key-manager", opts);
        if (e.url) {
          n.onclick = () => { window.focus(); window.location.href = e.url; };
        }
      }

      async function poll() {
        try {
          const after = Number(localStorage.getItem(STORAGE_KEY) || "0");
          const url = "/events/since?after=" + encodeURIComponent(after);
          const resp = await fetch(url, { headers: { "Accept": "application/json" } });
          if (!resp.ok) return;
          const data = await resp.json();
          if (Array.isArray(data.events)) {
            for (const e of data.events) {
              if (after > 0) showNotification(e); // skip backlog on first load
              if (e.id > after) localStorage.setItem(STORAGE_KEY, String(e.id));
            }
            // First-time cursor seed: server returns last_id (the highest
            // event id at query time). Compare against event ids — never
            // against wall-clock timestamps, since they live in different
            // numeric universes.
            if (after === 0 && typeof data.last_id === "number" && data.last_id > 0) {
              localStorage.setItem(STORAGE_KEY, String(data.last_id));
            }
          }
        } catch (_) {
          // Network blips are fine — try again on the next tick.
        }
      }

      // First poll soon, then every POLL_MS. The poll acts as a catch-up
      // backstop: if SSE was disconnected (proxy, sleep) any missed events
      // are still surfaced on the next poll thanks to the localStorage cursor.
      setTimeout(poll, 1500);
      setInterval(poll, POLL_MS);

      // Live event stream (PR-10). Pushes the same notification events as
      // /events/since without the 15s gap, plus broadcasts state changes
      // (key/session/artifact/handoff) that the UI can subscribe to via
      // window.devinmgr.onEvent(kind, handler). Auto-reconnects on drop.
      try {
        if (typeof window.EventSource === "function") {
          window.devinmgr = window.devinmgr || {};
          const listeners = new Map(); // kind -> Set<fn>
          window.devinmgr.onEvent = (kind, fn) => {
            if (!listeners.has(kind)) listeners.set(kind, new Set());
            listeners.get(kind).add(fn);
            return () => listeners.get(kind).delete(fn);
          };
          const es = new EventSource("/events/stream");
          window.devinmgr._es = es;
          // For each well-known event kind register a typed handler. We
          // could addEventListener('message', …) but the typed form maps
          // 1:1 to the bus's Kind constants in internal/events.
          const kinds = [
            "notification",
            "key.state_changed",
            "session.message_appended",
            "artifact.ready",
            "handoff.linked",
            "task.status_changed",
          ];
          kinds.forEach(kind => {
            es.addEventListener(kind, ev => {
              let payload;
              try { payload = JSON.parse(ev.data); } catch (_) { return; }
              // Pop a browser Notification only for the notification event
              // kind (others are state-change broadcasts for the UI).
              if (kind === "notification" && payload.data) {
                showNotification({
                  id:    payload.data.event_id || payload.id,
                  title: payload.data.title || "devin-key-manager",
                  body:  payload.data.body || "",
                  url:   payload.data.url || "",
                });
              }
              const set = listeners.get(kind);
              if (set) set.forEach(fn => { try { fn(payload); } catch (_) {} });
            });
          });
          es.onerror = () => {
            // Browser auto-reconnects after `retry:` (3s). Nothing to do.
          };
        }
      } catch (_) { /* old browser — polling continues to work */ }
    })();
  </script>
</body>
</html>{{end}}
