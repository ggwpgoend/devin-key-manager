{{define "keys_form"}}
<div class="fixed inset-0 z-30 flex items-center justify-center bg-slate-950/70 backdrop-blur-sm"
     hx-target="this"
     hx-swap="outerHTML">
  <div class="w-full max-w-lg rounded-lg border border-slate-800 bg-slate-900 p-6 shadow-xl">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-lg font-semibold">{{if .Editing}}Edit key{{else}}Add key{{end}}</h2>
      <button class="rounded-md p-1 text-slate-400 hover:text-white"
              hx-get="/keys/dialog/close"
              hx-target="#dialog"
              hx-swap="innerHTML">✕</button>
    </div>

    <form class="space-y-4"
          {{if .Editing}}hx-put="/keys/{{.Key.ID}}"{{else}}hx-post="/keys"{{end}}
          hx-target="body"
          hx-swap="outerHTML">
      <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-400">Label</label>
        <input type="text" name="label" required maxlength="80"
               value="{{if .Editing}}{{.Key.Label}}{{end}}"
               placeholder="e.g. trial-acct-3"
               class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white focus:border-indigo-500 focus:outline-none" />
      </div>

      <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-400">Plan</label>
        <select name="plan" required
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white focus:border-indigo-500 focus:outline-none">
          {{if not .Editing}}
          <option value="auto" selected>auto-detect</option>
          {{end}}
          <option value="trial" {{if and .Editing (eq (printf "%s" .Key.Plan) "trial")}}selected{{end}}>trial</option>
          <option value="free"  {{if and .Editing (eq (printf "%s" .Key.Plan) "free")}}selected{{end}}>free</option>
          <option value="paid"  {{if and .Editing (eq (printf "%s" .Key.Plan) "paid")}}selected{{end}}>paid</option>
        </select>
        <p class="mt-1 text-xs text-slate-500">trial &gt; free &gt; paid — trial keys are spent first to avoid expiry waste.</p>
      </div>

      {{if not .Editing}}
      <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-400">API key</label>
        <input type="password" name="api_key" required autocomplete="off"
               placeholder="dev-..." spellcheck="false"
               class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 font-mono text-sm text-white focus:border-indigo-500 focus:outline-none" />
        <div class="mt-1 flex items-center gap-3 text-xs">
          <button type="button"
                  class="rounded-md border border-slate-700 px-2 py-0.5 text-slate-200 hover:bg-slate-800"
                  hx-post="/keys/detect"
                  hx-include="closest form"
                  hx-target="#detect-status"
                  hx-swap="innerHTML">
            Detect plan
          </button>
          <span id="detect-status" class="text-slate-500">Stored encrypted at rest. Never shown again after this point.</span>
        </div>
      </div>
      {{end}}

      <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-400">Notes</label>
        <textarea name="notes" rows="2"
                  class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white focus:border-indigo-500 focus:outline-none">{{if .Editing}}{{.Key.Notes}}{{end}}</textarea>
      </div>

      {{if .Error}}
      <div class="rounded-md border border-rose-700/40 bg-rose-900/30 px-3 py-2 text-sm text-rose-200">
        {{.Error}}
      </div>
      {{end}}

      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button"
                hx-get="/keys/dialog/close"
                hx-target="#dialog"
                hx-swap="innerHTML"
                class="rounded-md border border-slate-700 px-3 py-1.5 text-sm text-slate-200 hover:bg-slate-800">Cancel</button>
        <button type="submit"
                class="rounded-md bg-indigo-500 px-4 py-1.5 text-sm font-medium text-white hover:bg-indigo-400">
          {{if .Editing}}Save{{else}}Add key{{end}}
        </button>
      </div>
    </form>
  </div>
</div>
{{end}}
